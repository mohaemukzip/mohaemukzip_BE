spring:
  application:
    name: mohaemukzip_BE

  jpa:
    database: mysql
    properties:
        hibernate:
            format_sql: true # SQL 로그 포맷팅


  profiles:
    active: dev
    # include: openai  <-- 제거 (통합하므로 불필요)

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${TEMPO_URL:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      base-path: /actuator         # /actuator/prometheus
  endpoint:
    health:
      db:
        enabled: true
        
cloud:
  aws:
    region:
      static: ap-northeast-2
    s3:
        bucket: mohaemukzip-s3

# Gemini API 설정 통합
gemini:
  recipe: # 레시피 챗봇
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
    model: gemini-2.5-flash
    timeout:
      connect: 10
      response: 30
  summary: # 요약 생성용
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
    model: gemini-2.5-flash
    timeout:
      connect: 10
      response: 30

youtube:
  api:
    base-url: https://www.googleapis.com/youtube/v3

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

# Discord 웹훅 (알림용)
discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL:}
